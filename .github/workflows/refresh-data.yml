name: Refresh Research Data

on:
  schedule:
    - cron: '0 11 * * *'      # daily at 6am ET (11 UTC)
    - cron: '0 12 * * 1'      # weekly Monday 7am ET (12 UTC)
  workflow_dispatch:
    inputs:
      cadence:
        description: 'Cadence tier'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - quarterly
          - annual

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Determine cadence
        id: cadence
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tier=${{ inputs.cadence }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "1" ]; then
            echo "tier=weekly" >> $GITHUB_OUTPUT
          else
            echo "tier=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run refresh on Fly.io via SSH
        run: |
          flyctl ssh console --app bank-fee-index -C "sh -c 'cd /app && DB_PATH=/data/crawler.db python3 -m fee_crawler refresh-data --cadence ${{ steps.cadence.outputs.tier }}'"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
