name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  python-unit-tests:
    name: Python unit tests (no e2e/llm/slow markers)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r fee_crawler/requirements.txt pytest pytest-timeout

      - name: Run unit tests (excludes e2e, llm, slow)
        run: |
          pytest -m "not e2e and not llm and not slow" \
            --timeout=30 \
            -v \
            --tb=short \
            fee_crawler/tests/
