name: Fee Crawl Pipeline

on:
  schedule:
    - cron: '0 14 * * 3'    # Wednesday 9am ET (14 UTC)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max institutions to crawl'
        required: false
        default: '100'
        type: string

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run crawl pipeline on Fly.io via SSH
        run: |
          flyctl ssh console --app bank-fee-index -C "sh -c 'cd /app && DB_PATH=/data/crawler.db python3 -m fee_crawler run-pipeline --limit ${{ inputs.limit || '100' }} --max-llm-calls 200 --workers 2'"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
