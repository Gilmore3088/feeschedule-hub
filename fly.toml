app = "bank-fee-index"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/crawler.db"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "bfi_data"
  destination = "/data"
